name: Deploy to cPanel

# SSH-based deploy. GitHub Actions connects to the cPanel server with a
# persistent SSH key (stored in ~/.ssh/authorized_keys on the server) and
# runs git pull + composer install + artisan migrate DIRECTLY ON THE SERVER.
#
# This survives any future changes to SSH password policy or terminal access,
# because authorized_keys auth is independent of the account password.
#
# Required GitHub Secrets:
#   SSH_PRIVATE_KEY — the private key generated on the server as
#                     ~/.ssh/gh_actions_deploy (full -----BEGIN...----- block)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy (pull + build on server)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ftp.lazpos.xyz
          username: lazpo23
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 10m
          script_stop: true
          script: |
            set -e
            cd ~/office.lahab.com.bd

            echo "==> Pulling latest code"
            git fetch origin main
            git reset --hard origin/main

            echo "==> Composer install (prod, optimized)"
            composer install --no-dev --optimize-autoloader --no-interaction --no-progress

            echo "==> Clearing stale caches"
            php artisan config:clear || true
            php artisan route:clear || true
            php artisan view:clear || true

            echo "==> Running migrations"
            php artisan migrate --force

            echo "==> Rebuilding caches"
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            echo "==> Storage permissions"
            chmod -R 755 storage bootstrap/cache

            echo "==> Deploy complete at $(date)"
