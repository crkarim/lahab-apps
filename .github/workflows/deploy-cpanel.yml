name: Deploy to cPanel

# SFTP deploy (port 22) via lftp mirror.
#
# Why SFTP over FTPS: plain FTP on port 21 times out from GitHub Actions IPs
# on many shared hosts — the control socket can't even connect. Port 22 (SFTP)
# rides on SSH and is almost always reachable from any IP.
#
# Required GitHub Secrets:
#   SFTP_PASSWORD  — the cPanel login password (same password as SSH access)
#
# Adjust if needed:
#   SFTP_HOST — the cPanel server hostname or the domain
#   SFTP_USER — the main cPanel username (NOT the per-domain FTP email)
#   SFTP_PORT — 22 for most hosts; some use 2222

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up PHP 8.2 with composer
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2
          extensions: mbstring, bcmath, gd, intl, exif, pdo_mysql, zip, mysqli

      - name: Install composer dependencies (prod)
        run: composer install --no-dev --optimize-autoloader --no-progress --prefer-dist --no-interaction

      - name: Install lftp
        run: sudo apt-get update -qq && sudo apt-get install -y lftp

      - name: Deploy via SFTP (lftp mirror)
        env:
          SFTP_HOST: ftp.lazpos.xyz
          SFTP_PORT: 22
          SFTP_USER: lazpo23
          SFTP_PASS: ${{ secrets.SFTP_PASSWORD }}
          REMOTE_DIR: /home/lazpo23/office.lahab.com.bd
        run: |
          # --delete is intentionally OFF so user uploads + .env never vanish.
          # Each exclude is applied to source paths (relative to repo root).
          lftp <<LFTPEOF
          set ssl:verify-certificate no
          set sftp:auto-confirm yes
          set net:timeout 30
          set net:max-retries 2
          set mirror:parallel-transfer-count 4
          open -u "$SFTP_USER","$SFTP_PASS" -p $SFTP_PORT sftp://$SFTP_HOST
          mirror -R -v --parallel=4 \
            --exclude-glob .git/ \
            --exclude-glob .github/ \
            --exclude-glob node_modules/ \
            --exclude-glob tests/ \
            --exclude-glob Tests/ \
            --exclude-glob '*.md' \
            --exclude-glob .editorconfig \
            --exclude-glob .styleci.yml \
            --exclude-glob phpunit.xml \
            --exclude-glob .env \
            --exclude-glob .env.backup \
            --exclude-glob .env.production \
            --exclude-glob .env.example \
            --exclude-glob Dockerfile \
            --exclude-glob docker-compose.yml \
            --exclude-glob storage/logs/ \
            --exclude-glob storage/framework/cache/ \
            --exclude-glob storage/framework/sessions/ \
            --exclude-glob storage/framework/views/ \
            --exclude-glob storage/app/public/restaurant/ \
            --exclude-glob storage/app/public/product/ \
            --exclude-glob storage/app/public/users/ \
            --exclude-glob storage/app/public/admin/ \
            --exclude-glob storage/app/public/delivery-man/ \
            --exclude-glob storage/app/public/payment_modules/ \
            --exclude-glob storage/app/public/loyalty/ \
            --exclude-glob installation/backup/ \
            . "$REMOTE_DIR/"
          bye
          LFTPEOF
