services:
  db:
    image: mysql:8.0
    container_name: lahab_admin_db
    command: --sql-mode=NO_ENGINE_SUBSTITUTION
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: delivery_app_db
    ports:
      - "3306:3306"
    volumes:
      - lahab_admin_db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 30

  app:
    build: .
    container_name: lahab_admin_app
    ports:
      - "8000:8000"
    volumes:
      - ./:/var/www/html
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: delivery_app_db
      DB_USERNAME: root
      DB_PASSWORD: ""
      APP_URL: http://localhost:8000
    depends_on:
      db:
        condition: service_healthy

  # Sidecar that runs `php artisan schedule:work`, which itself fires
  # `schedule:run` every minute. This is what drives the My Lahab
  # checklist reminder pushes + the 24h photo purge. Sharing the same
  # source volume so it always picks up code changes without rebuild.
  scheduler:
    build: .
    container_name: lahab_admin_scheduler
    command: php artisan schedule:work
    volumes:
      - ./:/var/www/html
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: delivery_app_db
      DB_USERNAME: root
      DB_PASSWORD: ""
      APP_URL: http://localhost:8000
    depends_on:
      app:
        condition: service_started
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  lahab_admin_db:
